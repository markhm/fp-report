# fp-report.conf — per-project settings for the shared fp-report tool.
# Copy this into a project's scripts/ dir and edit. Sourced as bash: KEY="value".
# Relative paths below resolve against THIS FILE's directory.

# fp issue short-id prefix — must match the project's .fp/config.toml `prefix`.
# Issue IDs render as "<FP_PREFIX>-<shortId>".
FP_PREFIX="FP"

# Human-readable project name — logo alt text (and the fallback app name).
PROJECT_NAME="project"

# Application/product name shown in the browser <title>. Empty → falls back to PROJECT_NAME.
APP_NAME=""

# Heading shown on the report page (on-page <h1>). No "fp" needed.
REPORT_TITLE="Roadmap & prioritisation"

# Status registry (labels, colours, open/done/rejected roles) — mirror the project's
# .fp/extensions/workflow.ts. Relative → resolved against this conf's dir.
STATUS_FILE="fp-report.status.json"

# Theme (colour palette + background, light & dark). A raw CSS file of custom properties
# for :root (light) and dark. Copy the tool's default and edit the hex values to rebrand.
# Relative → resolved against this conf's dir. Missing → the tool's neutral default.
THEME_FILE="fp-report.theme.css"

# Brand logos. Relative → resolved against ASSETS_DIR (defaults to OUTPUT_DIR).
# LOGO_LIGHT = dark wordmark for the light theme; LOGO_DARK = light wordmark for dark.
# Missing files fall back to the tool's neutral defaults.
LOGO_LIGHT="fp-report.logo-light.svg"
LOGO_DARK="fp-report.logo-dark.svg"

# Where the generated HTML is written, and where logos live. Relative → resolved
# against this conf's dir. Default (empty) = the sibling ../reports dir.
OUTPUT_DIR=""
OUTPUT_FILE="fp-report.html"
# ASSETS_DIR=""     # override only if logos live somewhere other than OUTPUT_DIR
